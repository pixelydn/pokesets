<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Golisopod — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← RU</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5ani/golisopod.gif" data-front="https://play.pokemonshowdown.com/sprites/gen5ani/golisopod.gif" data-back="https://play.pokemonshowdown.com/sprites/gen5ani-back/golisopod.gif" onmouseover="this.src=this.dataset.back" onmouseout="this.src=this.dataset.front" onerror="this.onerror=null;this.src='https://play.pokemonshowdown.com/sprites/gen5/golisopod.png';this.onmouseover=null;this.onmouseout=null" alt="Golisopod">
    <div class="name-block">
      <h1>Golisopod</h1>
      <div class="type-badges"><span class="type-badge type-bug">BUG</span><span class="type-badge type-water">WATER</span></div>
      <p class="subtitle">Gen 7 Battle Factory — RU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">First Impression</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Liquidation</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Leech Life</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Aqua Jet</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/choiceband.png" onerror="this.style.display='none'" alt="">Choice Band</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Emergency Exit</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Adamant (+Atk, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 168 / ATK 252 / SPE 88</span></div>
      </div>
    </div>
  </div>

</body>

</html>
