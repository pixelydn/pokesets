<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scizor — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← Uber</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5ani/scizor.gif" data-front="https://play.pokemonshowdown.com/sprites/gen5ani/scizor.gif" data-back="https://play.pokemonshowdown.com/sprites/gen5ani-back/scizor.gif" onmouseover="this.src=this.dataset.back" onmouseout="this.src=this.dataset.front" onerror="this.onerror=null;this.src='https://play.pokemonshowdown.com/sprites/gen5/scizor.png';this.onmouseover=null;this.onmouseout=null" alt="Scizor">
    <div class="name-block">
      <h1>Scizor</h1>
      <div class="type-badges"><span class="type-badge type-bug">BUG</span><span class="type-badge type-steel">STEEL</span></div>
      <p class="subtitle">Gen 7 Battle Factory — Uber</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Bullet Punch</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Roost</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">U-turn</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Swords Dance / Toxic</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/scizorite.png" onerror="this.style.display='none'" alt="">Scizorite</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Light Metal</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Sassy (+SpD, -Spe)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 252 / ATK 4 / SPD 252</span></div>
      </div>
    </div>
    <div class="set-extra"><span class="extra-chip">IVs: SPE 0</span></div>
  </div>

</body>

</html>
