<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wynaut — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← LC</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/wynaut.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/wynaut.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/wynaut.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/wynaut.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/wynaut.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Wynaut">
    <div class="name-block">
      <h1>Wynaut</h1>
      <div class="type-badges"><span class="type-badge type-psychic">PSYCHIC</span></div>
      <p class="subtitle">Gen 7 Battle Factory — LC</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Counter</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Mirror Coat</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Encore</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Tickle</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/berry-juice.png" alt="">Berry Juice</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Shadow Tag</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Bold (+Def, -Atk)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 156 / DEF 132 / SPD 132 / SPE 12</span></div>
      </div>
    </div>
  </div>

</body>

</html>
