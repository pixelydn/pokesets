<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shellder — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← LC</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5ani/shellder.gif" data-front="https://play.pokemonshowdown.com/sprites/gen5ani/shellder.gif" data-back="https://play.pokemonshowdown.com/sprites/gen5ani-back/shellder.gif" onmouseover="this.src=this.dataset.back" onmouseout="this.src=this.dataset.front" alt="Shellder">
    <div class="name-block">
      <h1>Shellder</h1>
      <div class="type-badges"><span class="type-badge type-water">WATER</span></div>
      <p class="subtitle">Gen 7 Battle Factory — LC</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Shell Smash</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Icicle Spear</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Liquidation</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Rock Blast</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/eviolite.png" alt="">Eviolite</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Skill Link</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Impish (+Def, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 36 / ATK 236 / DEF 36 / SPE 196</span></div>
      </div>
    </div>
  </div>

</body>

</html>
