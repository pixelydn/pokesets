<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nidoking — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← UU</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/nidoking.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/nidoking.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/nidoking.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/nidoking.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/nidoking.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Nidoking">
    <div class="name-block">
      <h1>Nidoking</h1>
      <div class="type-badges"><span class="type-badge type-poison">POISON</span><span class="type-badge type-ground">GROUND</span></div>
      <p class="subtitle">Gen 7 Battle Factory — UU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Sludge Wave</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Earth Power</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Ice Beam</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Substitute / Stealth Rock / Taunt</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/life-orb.png" alt="">Life Orb</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Sheer Force</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Timid (+Spe, -Atk)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">DEF 4 / SPA 252 / SPE 252</span></div>
      </div>
    </div>
    <div class="set-extra"><span class="extra-chip">IVs: ATK 0</span></div>
  </div>

</body>
