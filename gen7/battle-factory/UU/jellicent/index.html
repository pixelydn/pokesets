<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jellicent — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← UU</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/jellicent.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/jellicent.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/jellicent.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/jellicent.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/jellicent.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Jellicent">
    <div class="name-block">
      <h1>Jellicent</h1>
      <div class="type-badges"><span class="type-badge type-water">WATER</span><span class="type-badge type-ghost">GHOST</span></div>
      <p class="subtitle">Gen 7 Battle Factory — UU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Scald / Hex</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Taunt</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Will-O-Wisp</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Recover</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/leftovers.png" alt="">Leftovers / <img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/colbur-berry.png" alt="">Colbur Berry</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Water Absorb</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Bold (+Def, -Atk)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 248 / DEF 176 / SPE 84</span></div>
      </div>
    </div>
    <div class="set-extra"><span class="extra-chip">IVs: ATK 0</span></div>
  </div>

</body>

</html>
