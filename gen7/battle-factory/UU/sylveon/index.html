<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sylveon — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← UU</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5ani/sylveon.gif" data-front="https://play.pokemonshowdown.com/sprites/gen5ani/sylveon.gif" data-back="https://play.pokemonshowdown.com/sprites/gen5ani-back/sylveon.gif" onmouseover="this.src=this.dataset.back" onmouseout="this.src=this.dataset.front" onerror="this.onerror=null;this.src='https://play.pokemonshowdown.com/sprites/gen5/sylveon.png';this.onmouseover=null;this.onmouseout=null" alt="Sylveon">
    <div class="name-block">
      <h1>Sylveon</h1>

  <p class="sets-label">Set(s):</p>

    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Hyper Voice</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Wish</span></div>

      </div>
      <div class="set-stats">

        <div class="row"><span class="row-label">Ability</span><span class="row-value">Pixilate</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Bold (+Def, -Atk)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 252 / DEF 252 / SPA 4</span></div>
      </div>
    </div>
    <div class="set-extra"><span class="extra-chip">IVs: ATK 0</span></div>
  </div>
