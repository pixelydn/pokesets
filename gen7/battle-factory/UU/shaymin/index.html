<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shaymin — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← UU</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5ani/shaymin.gif" data-front="https://play.pokemonshowdown.com/sprites/gen5ani/shaymin.gif" data-back="https://play.pokemonshowdown.com/sprites/gen5ani-back/shaymin.gif" onmouseover="this.src=this.dataset.back" onmouseout="this.src=this.dataset.front" alt="Shaymin">
    <div class="name-block">
      <h1>Shaymin</h1>
      <div class="type-badges"><span class="type-badge type-grass">GRASS</span></div>
      <p class="subtitle">Gen 7 Battle Factory — UU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Celebrate</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Seed Flare</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Dazzling Gleam</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Hidden Power Fire</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/normaliumz.png" alt="">Normalium Z</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Natural Cure</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Timid (+Spe, -Atk)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">SPA 252 / SPD 4 / SPE 252</span></div>
      </div>
    </div>
    <div class="set-extra"><span class="extra-chip">IVs: ATK 0</span></div>
  </div>

</body>

</html>
