<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Beedrill — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← UU</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5ani/beedrill.gif" data-front="https://play.pokemonshowdown.com/sprites/gen5ani/beedrill.gif" data-back="https://play.pokemonshowdown.com/sprites/gen5ani-back/beedrill.gif" onmouseover="this.src=this.dataset.back" onmouseout="this.src=this.dataset.front" onerror="this.onerror=null;this.src='https://play.pokemonshowdown.com/sprites/gen5/beedrill.png';this.onmouseover=null;this.onmouseout=null" alt="Beedrill">
    <div class="name-block">
      <h1>Beedrill</h1>
      <div class="type-badges"><span class="type-badge type-bug">BUG</span><span class="type-badge type-poison">POISON</span></div>
      <p class="subtitle">Gen 7 Battle Factory — UU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">U-turn</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Poison Jab</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Drill Run</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Knock Off / Pursuit / Toxic Spikes</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/beedrillite.png" onerror="this.style.display='none'" alt="">Beedrillite</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Swarm</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Jolly (+Spe, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">ATK 252 / SPD 4 / SPE 252</span></div>
      </div>
    </div>
  </div>

</body>

</html>
