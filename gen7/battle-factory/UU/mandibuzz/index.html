<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mandibuzz — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← UU</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5ani/mandibuzz.gif" data-front="https://play.pokemonshowdown.com/sprites/gen5ani/mandibuzz.gif" data-back="https://play.pokemonshowdown.com/sprites/gen5ani-back/mandibuzz.gif" onmouseover="this.src=this.dataset.back" onmouseout="this.src=this.dataset.front" alt="Mandibuzz">
    <div class="name-block">
      <h1>Mandibuzz</h1>
      <div class="type-badges"><span class="type-badge type-dark">DARK</span><span class="type-badge type-flying">FLYING</span></div>
      <p class="subtitle">Gen 7 Battle Factory — UU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Roost</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Defog</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Foul Play</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Knock Off / Taunt / Toxic / U-turn</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/leftovers.png" alt="">Leftovers</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Overcoat</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Careful (+SpD, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 248 / DEF 68 / SPD 176 / SPE 16</span></div>
      </div>
    </div>
  </div>

</body>

</html>
