<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pidgeot — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← UU</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/pidgeot.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/pidgeot.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/pidgeot.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/pidgeot.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/pidgeot.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Pidgeot">
    <div class="name-block">
      <h1>Pidgeot</h1>
      <div class="type-badges"><span class="type-badge type-normal">NORMAL</span><span class="type-badge type-flying">FLYING</span></div>
      <p class="subtitle">Gen 7 Battle Factory — UU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Hurricane</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Heat Wave</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">U-turn / Work Up / Hidden Power Ground</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Roost</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/pidgeotite.png" alt="">Pidgeotite</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Big Pecks</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Timid (+Spe, -Atk)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">DEF 4 / SPA 252 / SPE 252</span></div>
      </div>
    </div>
  </div>

</body>

</html>
