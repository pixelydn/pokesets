<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Decidueye — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← UU</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5ani/decidueye.gif" data-front="https://play.pokemonshowdown.com/sprites/gen5ani/decidueye.gif" data-back="https://play.pokemonshowdown.com/sprites/gen5ani-back/decidueye.gif" onmouseover="this.src=this.dataset.back" onmouseout="this.src=this.dataset.front" alt="Decidueye">
    <div class="name-block">
      <h1>Decidueye</h1>
      <div class="type-badges"><span class="type-badge type-grass">GRASS</span><span class="type-badge type-ghost">GHOST</span></div>
      <p class="subtitle">Gen 7 Battle Factory — UU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Swords Dance</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Shadow Sneak / Substitute</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Spirit Shackle</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Leaf Blade</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/decidiumz.png" alt="">Decidium Z</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Overgrow</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Jolly (+Spe, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">ATK 252 / SPD 4 / SPE 252</span></div>
      </div>
    </div>
  </div>

</body>

</html>
