<!DOCTYPE html>

<head>

<body class="g7bf">
  <a class="back-link" href="../">← UU</a>

        <div class="row"><span class="row-label">Ability</span><span class="row-value">Water Bubble</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Adamant (+Atk, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 148 / ATK 252 / SPE 108</span></div>
      </div>
    </div>
  </div>
