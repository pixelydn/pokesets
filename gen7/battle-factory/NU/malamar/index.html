<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Malamar — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← NU</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5ani/malamar.gif" data-front="https://play.pokemonshowdown.com/sprites/gen5ani/malamar.gif" data-back="https://play.pokemonshowdown.com/sprites/gen5ani-back/malamar.gif" onmouseover="this.src=this.dataset.back" onmouseout="this.src=this.dataset.front" alt="Malamar">
    <div class="name-block">
      <h1>Malamar</h1>
      <div class="type-badges"><span class="type-badge type-dark">DARK</span><span class="type-badge type-psychic">PSYCHIC</span></div>
      <p class="subtitle">Gen 7 Battle Factory — NU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Rest</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Superpower</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Knock Off</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Sleep Talk</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/leftovers.png" alt="">Leftovers</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Contrary</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Careful (+SpD, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 252 / ATK 4 / SPD 252</span></div>
      </div>
    </div>
  </div>

</body>

</html>
