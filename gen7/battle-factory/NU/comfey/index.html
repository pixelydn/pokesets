<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Comfey — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← NU</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5ani/comfey.gif" data-front="https://play.pokemonshowdown.com/sprites/gen5ani/comfey.gif" data-back="https://play.pokemonshowdown.com/sprites/gen5ani-back/comfey.gif" onmouseover="this.src=this.dataset.back" onmouseout="this.src=this.dataset.front" alt="Comfey">
    <div class="name-block">
      <h1>Comfey</h1>
      <div class="type-badges"><span class="type-badge type-fairy">FAIRY</span></div>
      <p class="subtitle">Gen 7 Battle Factory — NU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Calm Mind</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Draining Kiss</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Giga Drain</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Hidden Power Fire</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/lifeorb.png" alt="">Life Orb</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Triage</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Modest (+SpA, -Atk)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 236 / SPA 252 / SPE 20</span></div>
      </div>
    </div>
    <div class="set-extra"><span class="extra-chip">IVs: ATK 0</span></div>
  </div>

</body>

</html>
