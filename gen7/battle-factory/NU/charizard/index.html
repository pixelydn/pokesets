<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Charizard — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← NU</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/charizard.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/charizard.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/charizard.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/charizard.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/charizard.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Charizard">
    <div class="name-block">
      <h1>Charizard</h1>
      <div class="type-badges"><span class="type-badge type-fire">FIRE</span><span class="type-badge type-flying">FLYING</span></div>
      <p class="subtitle">Gen 7 Battle Factory — NU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Hold Hands</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Fire Blast</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Hidden Power Grass</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Focus Blast</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value">Normalium Z</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Blaze</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Timid (+Spe, -Atk)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 32 / SPA 228 / SPD 32 / SPE 216</span></div>
      </div>
    </div>
    <div class="set-extra"><span class="extra-chip">IVs: ATK 0</span></div>
  </div>

</body>

</html>
