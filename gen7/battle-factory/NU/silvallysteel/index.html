        <div class="row"><span class="row-label">Nature</span><span class="row-value">Calm (+SpD, -Atk)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 232 / SPD 216 / SPE 60</span></div>
