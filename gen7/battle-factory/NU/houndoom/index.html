<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Houndoom — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← NU</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/houndoom.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/houndoom.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/houndoom.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/houndoom.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/houndoom.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Houndoom">
    <div class="name-block">
      <h1>Houndoom</h1>
      <div class="type-badges"><span class="type-badge type-dark">DARK</span><span class="type-badge type-fire">FIRE</span></div>
      <p class="subtitle">Gen 7 Battle Factory — NU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Fire Blast</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Dark Pulse</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Nasty Plot</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Hidden Power Steel</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value">Darkinium Z</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Flash Fire</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Timid (+Spe, -Atk)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">SPA 252 / SPD 4 / SPE 252</span></div>
      </div>
    </div>
  </div>

</body>

</html>
