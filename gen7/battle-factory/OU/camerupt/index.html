<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Camerupt — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← OU</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5ani/camerupt.gif" data-front="https://play.pokemonshowdown.com/sprites/gen5ani/camerupt.gif" data-back="https://play.pokemonshowdown.com/sprites/gen5ani-back/camerupt.gif" onmouseover="this.src=this.dataset.back" onmouseout="this.src=this.dataset.front" onerror="this.onerror=null;this.src='https://play.pokemonshowdown.com/sprites/gen5/camerupt.png';this.onmouseover=null;this.onmouseout=null" alt="Camerupt">
    <div class="name-block">
      <h1>Camerupt</h1>
      <div class="type-badges"><span class="type-badge type-fire">FIRE</span><span class="type-badge type-ground">GROUND</span></div>
      <p class="subtitle">Gen 7 Battle Factory — OU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Fire Blast</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Earth Power</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Toxic</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Rock Slide / Stealth Rock</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/cameruptite.png" onerror="this.style.display='none'" alt="">Cameruptite</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Magma Armor</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Modest (+SpA, -Atk)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 128 / SPA 252 / SPE 128</span></div>
      </div>
    </div>
  </div>

</body>

</html>
