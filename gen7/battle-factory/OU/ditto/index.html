<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ditto — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← OU</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5ani/ditto.gif" data-front="https://play.pokemonshowdown.com/sprites/gen5ani/ditto.gif" data-back="https://play.pokemonshowdown.com/sprites/gen5ani-back/ditto.gif" onmouseover="this.src=this.dataset.back" onmouseout="this.src=this.dataset.front" onerror="this.onerror=null;this.src='https://play.pokemonshowdown.com/sprites/gen5/ditto.png';this.onmouseover=null;this.onmouseout=null" alt="Ditto">
    <div class="name-block">
      <h1>Ditto</h1>
      <div class="type-badges"><span class="type-badge type-normal">NORMAL</span></div>
      <p class="subtitle">Gen 7 Battle Factory — OU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Transform</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/choicescarf.png" onerror="this.style.display='none'" alt="">Choice Scarf</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Imposter</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Relaxed (+Def, -Spe)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 252 / ATK 4 / DEF 252</span></div>
      </div>
    </div>
    <div class="set-extra"><span class="extra-chip">IVs: SPE 0</span></div>
  </div>

</body>

</html>
