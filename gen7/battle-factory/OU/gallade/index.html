<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gallade — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← OU</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5ani/gallade.gif" data-front="https://play.pokemonshowdown.com/sprites/gen5ani/gallade.gif" data-back="https://play.pokemonshowdown.com/sprites/gen5ani-back/gallade.gif" onmouseover="this.src=this.dataset.back" onmouseout="this.src=this.dataset.front" alt="Gallade">
    <div class="name-block">
      <h1>Gallade</h1>
      <div class="type-badges"><span class="type-badge type-psychic">PSYCHIC</span><span class="type-badge type-fighting">FIGHTING</span></div>
      <p class="subtitle">Gen 7 Battle Factory — OU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Swords Dance</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Close Combat</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Zen Headbutt</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Knock Off</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/galladite.png" alt="">Galladite</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Justified</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Jolly (+Spe, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">ATK 252 / DEF 4 / SPE 252</span></div>
      </div>
    </div>
  </div>

</body>

</html>
