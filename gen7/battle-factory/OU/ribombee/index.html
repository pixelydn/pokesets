<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ribombee — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← OU</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/ribombee.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/ribombee.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/ribombee.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/ribombee.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/ribombee.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Ribombee">
    <div class="name-block">
      <h1>Ribombee</h1>
      <div class="type-badges"><span class="type-badge type-bug">BUG</span><span class="type-badge type-fairy">FAIRY</span></div>
      <p class="subtitle">Gen 7 Battle Factory — OU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Sticky Web</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Moonblast</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Hidden Power Fire</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Stun Spore / Quiver Dance</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/focus-sash.png" alt="">Focus Sash</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Shield Dust</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Timid (+Spe, -Atk)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">SPA 252 / SPD 4 / SPE 252</span></div>
      </div>
    </div>
  </div>

</body>

</html>
