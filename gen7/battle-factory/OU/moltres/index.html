<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Moltres — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← OU</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/moltres.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/moltres.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/moltres.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/moltres.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/moltres.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Moltres">
    <div class="name-block">
      <h1>Moltres</h1>
      <div class="type-badges"><span class="type-badge type-fire">FIRE</span><span class="type-badge type-flying">FLYING</span></div>
      <p class="subtitle">Gen 7 Battle Factory — OU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Roost</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Defog</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Flamethrower</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Substitute</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/leftovers.png" alt="">Leftovers</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Pressure</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Timid (+Spe, -Atk)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 208 / DEF 60 / SPE 240</span></div>
      </div>
    </div>
  </div>

</body>

</html>
