<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mantine — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← OU</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5ani/mantine.gif" data-front="https://play.pokemonshowdown.com/sprites/gen5ani/mantine.gif" data-back="https://play.pokemonshowdown.com/sprites/gen5ani-back/mantine.gif" onmouseover="this.src=this.dataset.back" onmouseout="this.src=this.dataset.front" onerror="this.onerror=null;this.src='https://play.pokemonshowdown.com/sprites/gen5/mantine.png';this.onmouseover=null;this.onmouseout=null" alt="Mantine">
    <div class="name-block">
      <h1>Mantine</h1>
      <div class="type-badges"><span class="type-badge type-water">WATER</span><span class="type-badge type-flying">FLYING</span></div>
      <p class="subtitle">Gen 7 Battle Factory — OU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Roost</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Scald</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Defog</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Toxic / Haze</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/leftovers.png" onerror="this.style.display='none'" alt="">Leftovers</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Water Absorb</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Calm (+SpD, -Atk)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 252 / DEF 36 / SPD 220</span></div>
      </div>
    </div>
  </div>

</body>

</html>
