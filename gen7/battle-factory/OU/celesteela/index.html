<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Celesteela — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← OU</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5ani/celesteela.gif" data-front="https://play.pokemonshowdown.com/sprites/gen5ani/celesteela.gif" data-back="https://play.pokemonshowdown.com/sprites/gen5ani-back/celesteela.gif" onmouseover="this.src=this.dataset.back" onmouseout="this.src=this.dataset.front" alt="Celesteela">
    <div class="name-block">
      <h1>Celesteela</h1>
      <div class="type-badges"><span class="type-badge type-steel">STEEL</span><span class="type-badge type-flying">FLYING</span></div>
      <p class="subtitle">Gen 7 Battle Factory — OU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Leech Seed</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Protect</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Heavy Slam</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Flamethrower</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/leftovers.png" alt="">Leftovers</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Beast Boost</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Sassy (+SpD, -Spe)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 248 / DEF 28 / SPD 232</span></div>
      </div>
    </div>
  </div>

</body>

</html>
