<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Audino — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← PU</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5/audino.png" alt="Audino" onerror="this.setAttribute('data-broken',1)">
    <div class="name-block">
      <h1>Audino</h1>
      <p class="subtitle">Gen 7 Battle Factory — PU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Wish</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Protect</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Knock Off</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Toxic / Encore</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value">Leftovers</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Regenerator</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Calm (+SpD, -Atk)</span></div>
        <div class="row"><span class="row-label">EV / IV</span><span class="row-value">HP 248 / DEF 8 / SPD 252</span></div>
      </div>
    </div>
  </div>

</body>

</html>
