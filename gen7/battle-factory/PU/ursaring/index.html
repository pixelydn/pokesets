<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ursaring — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← PU</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5ani/ursaring.gif" data-front="https://play.pokemonshowdown.com/sprites/gen5ani/ursaring.gif" data-back="https://play.pokemonshowdown.com/sprites/gen5ani-back/ursaring.gif" onmouseover="this.src=this.dataset.back" onmouseout="this.src=this.dataset.front" alt="Ursaring">
    <div class="name-block">
      <h1>Ursaring</h1>
      <div class="type-badges"><span class="type-badge type-normal">NORMAL</span></div>
      <p class="subtitle">Gen 7 Battle Factory — PU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Facade</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Close Combat</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Crunch</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Swords Dance / Protect</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/flameorb.png" alt="">Flame Orb</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Guts</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Adamant (+Atk, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">ATK 252 / DEF 4 / SPE 252</span></div>
      </div>
    </div>
  </div>

</body>

</html>
