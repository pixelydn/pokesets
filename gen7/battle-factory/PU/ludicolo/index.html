<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ludicolo — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← PU</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/ludicolo.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/ludicolo.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/ludicolo.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/ludicolo.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/ludicolo.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Ludicolo">
    <div class="name-block">
      <h1>Ludicolo</h1>
      <div class="type-badges"><span class="type-badge type-water">WATER</span><span class="type-badge type-grass">GRASS</span></div>
      <p class="subtitle">Gen 7 Battle Factory — PU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Hydro Pump</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Giga Drain</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Ice Beam</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Rain Dance</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/life-orb.png" alt="">Life Orb / Waterium Z</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Swift Swim</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Modest (+SpA, -Atk)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">SPA 252 / SPD 4 / SPE 252</span></div>
      </div>
    </div>
  </div>

</body>

</html>
