<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Eelektross — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← PU</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5ani/eelektross.gif" data-front="https://play.pokemonshowdown.com/sprites/gen5ani/eelektross.gif" data-back="https://play.pokemonshowdown.com/sprites/gen5ani-back/eelektross.gif" onmouseover="this.src=this.dataset.back" onmouseout="this.src=this.dataset.front" onerror="this.onerror=null;this.src='https://play.pokemonshowdown.com/sprites/gen5/eelektross.png';this.onmouseover=null;this.onmouseout=null" alt="Eelektross">
    <div class="name-block">
      <h1>Eelektross</h1>
      <div class="type-badges"><span class="type-badge type-electric">ELECTRIC</span></div>
      <p class="subtitle">Gen 7 Battle Factory — PU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Volt Switch</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Giga Drain</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Flamethrower</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Acid Spray / Knock Off</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/assaultvest.png" onerror="this.style.display='none'" alt="">Assault Vest</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Levitate</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Modest (+SpA, -Atk)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 248 / SPA 252 / SPD 8</span></div>
      </div>
    </div>
  </div>

</body>

</html>
