<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cradily — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← PU</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5/cradily.png" alt="Cradily" onerror="this.setAttribute('data-broken',1)">
    <div class="name-block">
      <h1>Cradily</h1>
      <p class="subtitle">Gen 7 Battle Factory — PU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Stealth Rock</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Recover</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Giga Drain</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Rock Slide</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value">Leftovers</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Storm Drain</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Sassy (+SpD, -Spe)</span></div>
        <div class="row"><span class="row-label">EV / IV</span><span class="row-value">HP 248 / DEF 8 / SPD 252</span></div>
      </div>
    </div>
