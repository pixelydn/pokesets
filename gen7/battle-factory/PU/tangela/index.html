<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tangela — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← PU</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5ani/tangela.gif" data-front="https://play.pokemonshowdown.com/sprites/gen5ani/tangela.gif" data-back="https://play.pokemonshowdown.com/sprites/gen5ani-back/tangela.gif" onmouseover="this.src=this.dataset.back" onmouseout="this.src=this.dataset.front" alt="Tangela">
    <div class="name-block">
      <h1>Tangela</h1>
      <div class="type-badges"><span class="type-badge type-grass">GRASS</span></div>
      <p class="subtitle">Gen 7 Battle Factory — PU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Giga Drain</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Hidden Power Ice</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Synthesis</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Leech Seed / Sleep Powder / Knock Off</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/eviolite.png" alt="">Eviolite</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Regenerator</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Bold (+Def, -Atk)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 252 / DEF 252 / SPD 4</span></div>
      </div>
    </div>
  </div>

</body>

</html>
