<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← PU</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/munchlax.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/munchlax.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/munchlax.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/munchlax.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/munchlax.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Munchlax">
    <div class="name-block">
      <h1>Munchlax</h1>
      <div class="type-badges"><span class="type-badge type-normal">NORMAL</span></div>

    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Body Slam</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Curse</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Sleep Talk</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Rest</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/eviolite.png" alt="">Eviolite</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Thick Fat</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Careful (+SpD, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">ATK 4 / DEF 252 / SPD 252</span></div>
      </div>
    </div>
  </div>
