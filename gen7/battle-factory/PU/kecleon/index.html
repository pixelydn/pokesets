<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kecleon — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← PU</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/kecleon.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/kecleon.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/kecleon.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/kecleon.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/kecleon.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Kecleon">
    <div class="name-block">
      <h1>Kecleon</h1>
      <div class="type-badges"><span class="type-badge type-normal">NORMAL</span></div>
      <p class="subtitle">Gen 7 Battle Factory — PU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Knock Off</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Drain Punch</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Shadow Sneak</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Sucker Punch / Power-Up Punch</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/assault-vest.png" alt="">Assault Vest</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Protean</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Adamant (+Atk, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 172 / ATK 252 / SPE 84</span></div>
      </div>
    </div>
  </div>

</body>

</html>
