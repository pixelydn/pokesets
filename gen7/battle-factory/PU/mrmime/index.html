<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mr. Mime — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← PU</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/mrmime.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/mrmime.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/mrmime.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/mrmime.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/mrmime.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Mr. Mime">
    <div class="name-block">
      <h1>Mr. Mime</h1>
      <div class="type-badges"><span class="type-badge type-psychic">PSYCHIC</span><span class="type-badge type-fairy">FAIRY</span></div>
      <p class="subtitle">Gen 7 Battle Factory — PU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Nasty Plot</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Dazzling Gleam</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Psyshock</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Focus Blast</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/life-orb.png" alt="">Life Orb / Fairium Z</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Filter</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Timid (+Spe, -Atk)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">DEF 4 / SPA 252 / SPE 252</span></div>
      </div>
    </div>
  </div>

</body>

</html>
