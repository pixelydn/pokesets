<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Conkeldurr — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← Mono</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5ani/conkeldurr.gif" data-front="https://play.pokemonshowdown.com/sprites/gen5ani/conkeldurr.gif" data-back="https://play.pokemonshowdown.com/sprites/gen5ani-back/conkeldurr.gif" onmouseover="this.src=this.dataset.back" onmouseout="this.src=this.dataset.front" alt="Conkeldurr">
    <div class="name-block">
      <h1>Conkeldurr</h1>
      <div class="type-badges"><span class="type-badge type-fighting">FIGHTING</span></div>
      <p class="subtitle">Gen 7 Battle Factory — Mono</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Drain Punch</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Knock Off</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Ice Punch</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Mach Punch</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/assaultvest.png" alt="">Assault Vest</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Guts</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Adamant (+Atk, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 252 / ATK 252 / DEF 4</span></div>
      </div>
    </div>
  </div>

</body>

</html>
