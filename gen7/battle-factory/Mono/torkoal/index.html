<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← Mono</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/torkoal.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/torkoal.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/torkoal.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/torkoal.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/torkoal.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Torkoal">
    <div class="name-block">
      <h1>Torkoal</h1>
      <div class="type-badges"><span class="type-badge type-fire">FIRE</span></div>

  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Lava Plume</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Stealth Rock</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Rapid Spin</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Yawn / Toxic</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/heat-rock.png" alt="">Heat Rock</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Drought</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Bold (+Def, -Atk)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 248 / DEF 252 / SPD 8</span></div>
      </div>
    </div>
  </div>
