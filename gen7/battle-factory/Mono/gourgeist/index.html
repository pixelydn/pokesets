<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gourgeist — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← Mono</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/gourgeist.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/gourgeist.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/gourgeist.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/gourgeist.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/gourgeist.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Gourgeist">
    <div class="name-block">
      <h1>Gourgeist</h1>
      <div class="type-badges"><span class="type-badge type-ghost">GHOST</span><span class="type-badge type-grass">GRASS</span></div>
      <p class="subtitle">Gen 7 Battle Factory — Mono</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Seed Bomb</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Will-O-Wisp</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Leech Seed</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Synthesis</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/leftovers.png" alt="">Leftovers</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Frisk</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Impish (+Def, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 248 / DEF 252 / SPD 8</span></div>
      </div>
    </div>
  </div>

</body>

</html>
