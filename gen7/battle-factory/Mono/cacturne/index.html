<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cacturne — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← Mono</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5ani/cacturne.gif" data-front="https://play.pokemonshowdown.com/sprites/gen5ani/cacturne.gif" data-back="https://play.pokemonshowdown.com/sprites/gen5ani-back/cacturne.gif" onmouseover="this.src=this.dataset.back" onmouseout="this.src=this.dataset.front" alt="Cacturne">
    <div class="name-block">
      <h1>Cacturne</h1>
      <div class="type-badges"><span class="type-badge type-grass">GRASS</span><span class="type-badge type-dark">DARK</span></div>
      <p class="subtitle">Gen 7 Battle Factory — Mono</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Spikes</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Sucker Punch</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Seed Bomb</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Swords Dance</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/lifeorb.png" alt="">Life Orb</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Water Absorb</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Jolly (+Spe, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">ATK 252 / DEF 4 / SPE 252</span></div>
      </div>
    </div>
  </div>

</body>

</html>
