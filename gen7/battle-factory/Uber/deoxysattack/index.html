<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Deoxys-Attack — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← Uber</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5ani/deoxys-attack.gif" data-front="https://play.pokemonshowdown.com/sprites/gen5ani/deoxys-attack.gif" data-back="https://play.pokemonshowdown.com/sprites/gen5ani-back/deoxys-attack.gif" onmouseover="this.src=this.dataset.back" onmouseout="this.src=this.dataset.front" alt="Deoxys-Attack">
    <div class="name-block">
      <h1>Deoxys-Attack</h1>
      <div class="type-badges"><span class="type-badge type-psychic">PSYCHIC</span></div>
      <p class="subtitle">Gen 7 Battle Factory — Uber</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Psycho Boost</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Ice Beam</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Superpower</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Spikes / Dark Pulse / Extreme Speed</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/lifeorb.png" alt="">Life Orb</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Pressure</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Rash (+SpA, -SpD)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">ATK 4 / SPA 252 / SPE 252</span></div>
      </div>
    </div>
  </div>

</body>

</html>
