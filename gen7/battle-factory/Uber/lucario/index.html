<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lucario — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← Uber</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/lucario.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/lucario.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/lucario.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/lucario.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/lucario.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Lucario">
    <div class="name-block">
      <h1>Lucario</h1>
      <div class="type-badges"><span class="type-badge type-fighting">FIGHTING</span><span class="type-badge type-steel">STEEL</span></div>
      <p class="subtitle">Gen 7 Battle Factory — Uber</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Close Combat</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Meteor Mash</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Bullet Punch</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Swords Dance</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/lucarionite.png" alt="">Lucarionite</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Justified</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Jolly (+Spe, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">ATK 252 / SPD 4 / SPE 252</span></div>
      </div>
    </div>
  </div>

</body>

</html>
