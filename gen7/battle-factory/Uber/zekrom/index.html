<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zekrom — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← Uber</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/zekrom.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/zekrom.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/zekrom.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/zekrom.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/zekrom.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Zekrom">
    <div class="name-block">
      <h1>Zekrom</h1>
      <div class="type-badges"><span class="type-badge type-dragon">DRAGON</span><span class="type-badge type-electric">ELECTRIC</span></div>
      <p class="subtitle">Gen 7 Battle Factory — Uber</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Hone Claws</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Outrage</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Bolt Strike</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Substitute / Draco Meteor</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value">Dragonium Z</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Teravolt</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Adamant (+Atk, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 64 / ATK 252 / SPE 192</span></div>
      </div>
    </div>
  </div>

</body>

</html>
