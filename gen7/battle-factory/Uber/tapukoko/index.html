<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tapu Koko — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← Uber</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5/tapukoko.png" alt="Tapu Koko" onerror="this.setAttribute('data-broken',1)">
    <div class="name-block">
      <h1>Tapu Koko</h1>
      <p class="subtitle">Gen 7 Battle Factory — Uber</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Thunder</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Nature's Madness</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Taunt</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">U-turn</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value">Electrium Z</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Electric Surge</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Timid (+Spe, -Atk)</span></div>
        <div class="row"><span class="row-label">EV / IV</span><span class="row-value">DEF 4 / SPA 252 / SPE 252</span></div>
      </div>
    </div>
  </div>

</body>

</html>
