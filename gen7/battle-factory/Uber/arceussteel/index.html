<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Arceus-Steel — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← Uber</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5ani/arceus-steel.gif" data-front="https://play.pokemonshowdown.com/sprites/gen5ani/arceus-steel.gif" data-back="https://play.pokemonshowdown.com/sprites/gen5ani-back/arceus-steel.gif" onmouseover="this.src=this.dataset.back" onmouseout="this.src=this.dataset.front" alt="Arceus-Steel">
    <div class="name-block">
      <h1>Arceus-Steel</h1>
      <div class="type-badges"><span class="type-badge type-steel">STEEL</span></div>
      <p class="subtitle">Gen 7 Battle Factory — Uber</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Calm Mind</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Judgment</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Earth Power</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Recover</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/ironplate.png" alt="">Iron Plate</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Multitype</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Timid (+Spe, -Atk)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 248 / SPA 8 / SPE 252</span></div>
      </div>
    </div>
  </div>

</body>

</html>
