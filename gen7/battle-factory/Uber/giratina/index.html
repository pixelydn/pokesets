<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Giratina — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← Uber</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5ani/giratina.gif" data-front="https://play.pokemonshowdown.com/sprites/gen5ani/giratina.gif" data-back="https://play.pokemonshowdown.com/sprites/gen5ani-back/giratina.gif" onmouseover="this.src=this.dataset.back" onmouseout="this.src=this.dataset.front" alt="Giratina">
    <div class="name-block">
      <h1>Giratina</h1>
      <div class="type-badges"><span class="type-badge type-ghost">GHOST</span><span class="type-badge type-dragon">DRAGON</span></div>
      <p class="subtitle">Gen 7 Battle Factory — Uber</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Defog</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Dragon Tail / Roar</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Will-O-Wisp</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Rest</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/leftovers.png" alt="">Leftovers</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Pressure</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Impish (+Def, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 252 / DEF 204 / SPD 52</span></div>
      </div>
    </div>
    <div class="set-extra"><span class="extra-chip">IVs: SPE 30</span></div>
  </div>

</body>

</html>
