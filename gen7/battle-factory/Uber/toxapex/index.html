<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Toxapex — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← Uber</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5/toxapex.png" alt="Toxapex" onerror="this.setAttribute('data-broken',1)">
    <div class="name-block">
      <h1>Toxapex</h1>
      <p class="subtitle">Gen 7 Battle Factory — Uber</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Toxic Spikes</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Scald</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Recover</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Haze</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value">Rocky Helmet / Shed Shell</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Regenerator</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Bold (+Def, -Atk)</span></div>
        <div class="row"><span class="row-label">EV / IV</span><span class="row-value">HP 252 / DEF 252 / SPD 4</span></div>
      </div>
    </div>
  </div>

</body>
