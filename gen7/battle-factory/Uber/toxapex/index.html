<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Toxapex — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← Uber</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5ani/toxapex.gif" data-front="https://play.pokemonshowdown.com/sprites/gen5ani/toxapex.gif" data-back="https://play.pokemonshowdown.com/sprites/gen5ani-back/toxapex.gif" onmouseover="this.src=this.dataset.back" onmouseout="this.src=this.dataset.front" alt="Toxapex">
    <div class="name-block">
      <h1>Toxapex</h1>
      <div class="type-badges"><span class="type-badge type-poison">POISON</span><span class="type-badge type-water">WATER</span></div>
      <p class="subtitle">Gen 7 Battle Factory — Uber</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Toxic Spikes</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Scald</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Recover</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Haze</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/rockyhelmet.png" alt="">Rocky Helmet / <img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/shedshell.png" alt="">Shed Shell</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Regenerator</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Bold (+Def, -Atk)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 252 / DEF 252 / SPD 4</span></div>
      </div>
    </div>
  </div>

</body>

</html>
