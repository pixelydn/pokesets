<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Palkia — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← Uber</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/palkia.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/palkia.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/palkia.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/palkia.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/palkia.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Palkia">
    <div class="name-block">
      <h1>Palkia</h1>
      <div class="type-badges"><span class="type-badge type-water">WATER</span><span class="type-badge type-dragon">DRAGON</span></div>
      <p class="subtitle">Gen 7 Battle Factory — Uber</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Hydro Pump</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Spacial Rend / Draco Meteor</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Thunder</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Focus Punch / Fire Blast</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/life-orb.png" alt="">Life Orb</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Pressure</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Hasty (+Spe, -Def)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">ATK 4 / SPA 252 / SPE 252</span></div>
      </div>
    </div>
  </div>

</body>

</html>
