<!DOCTYPE html>
<html lang="en">

<head>

  <link rel="stylesheet" href="../../../../styles.css">

<body class="g7bf">
  <a class="back-link" href="../">← RU</a>

    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/rotom-mow.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/rotom-mow.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/rotom-mow.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/rotom-mow.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/rotom-mow.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Rotom-Mow">
    <div class="name-block">
      <h1>Rotom-Mow</h1>

    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Volt Switch</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Leaf Storm</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Defog</span></div>

      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value">Grassium Z</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Levitate</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Timid (+Spe, -Atk)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">SPA 252 / SPD 4 / SPE 252</span></div>
      </div>
    </div>
  </div>
