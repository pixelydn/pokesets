<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dragalge — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← RU</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5ani/dragalge.gif" data-front="https://play.pokemonshowdown.com/sprites/gen5ani/dragalge.gif" data-back="https://play.pokemonshowdown.com/sprites/gen5ani-back/dragalge.gif" onmouseover="this.src=this.dataset.back" onmouseout="this.src=this.dataset.front" alt="Dragalge">
    <div class="name-block">
      <h1>Dragalge</h1>
      <div class="type-badges"><span class="type-badge type-poison">POISON</span><span class="type-badge type-dragon">DRAGON</span></div>
      <p class="subtitle">Gen 7 Battle Factory — RU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Draco Meteor</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Sludge Wave</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Hidden Power Fire</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Toxic Spikes</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/dragoniumz.png" alt="">Dragonium Z</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Adaptability</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Modest (+SpA, -Atk)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 204 / SPA 252 / SPE 52</span></div>
      </div>
    </div>
  </div>

</body>

</html>
