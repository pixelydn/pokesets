<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Metagross — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← RU</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5/metagross.png" alt="Metagross" onerror="this.setAttribute('data-broken',1)">
    <div class="name-block">
      <h1>Metagross</h1>
      <p class="subtitle">Gen 7 Battle Factory — RU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Stealth Rock</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Meteor Mash</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Earthquake</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Explosion</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value">Colbur Berry</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Clear Body</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Adamant (+Atk, -SpA)</span></div>
        <div class="row"><span class="row-label">EV / IV</span><span class="row-value">HP 236 / ATK 96 / SPE 176</span></div>
      </div>
    </div>
  </div>

</body>

</html>
