<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tyrantrum — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← RU</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/tyrantrum.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/tyrantrum.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/tyrantrum.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/tyrantrum.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/tyrantrum.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Tyrantrum">
    <div class="name-block">
      <h1>Tyrantrum</h1>
      <div class="type-badges"><span class="type-badge type-rock">ROCK</span><span class="type-badge type-dragon">DRAGON</span></div>
      <p class="subtitle">Gen 7 Battle Factory — RU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Head Smash</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Outrage</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Earthquake</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Superpower</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/choice-band.png" alt="">Choice Band</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Rock Head</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Adamant (+Atk, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">ATK 252 / SPD 4 / SPE 252</span></div>
      </div>
    </div>
  </div>

</body>

</html>
