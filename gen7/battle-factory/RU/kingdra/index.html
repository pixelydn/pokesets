<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kingdra — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← RU</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5ani/kingdra.gif" data-front="https://play.pokemonshowdown.com/sprites/gen5ani/kingdra.gif" data-back="https://play.pokemonshowdown.com/sprites/gen5ani-back/kingdra.gif" onmouseover="this.src=this.dataset.back" onmouseout="this.src=this.dataset.front" alt="Kingdra">
    <div class="name-block">
      <h1>Kingdra</h1>
      <div class="type-badges"><span class="type-badge type-water">WATER</span><span class="type-badge type-dragon">DRAGON</span></div>
      <p class="subtitle">Gen 7 Battle Factory — RU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Focus Energy</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Draco Meteor</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Hydro Pump</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Substitute</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/scopelens.png" alt="">Scope Lens</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Sniper</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Timid (+Spe, -Atk)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">SPA 252 / SPD 4 / SPE 252</span></div>
      </div>
    </div>
  </div>

</body>

</html>
