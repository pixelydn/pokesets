<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Yanmega — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← RU</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/yanmega.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/yanmega.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/yanmega.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/yanmega.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/yanmega.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Yanmega">
    <div class="name-block">
      <h1>Yanmega</h1>
      <div class="type-badges"><span class="type-badge type-bug">BUG</span><span class="type-badge type-flying">FLYING</span></div>
      <p class="subtitle">Gen 7 Battle Factory — RU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Bug Buzz</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Air Slash</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">U-turn</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Giga Drain</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/choice-specs.png" alt="">Choice Specs</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Tinted Lens</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Timid (+Spe, -Atk)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">SPA 252 / SPD 4 / SPE 252</span></div>
      </div>
    </div>
  </div>

</body>

</html>
