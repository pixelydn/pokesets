<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Uxie — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← RU</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5ani/uxie.gif" data-front="https://play.pokemonshowdown.com/sprites/gen5ani/uxie.gif" data-back="https://play.pokemonshowdown.com/sprites/gen5ani-back/uxie.gif" onmouseover="this.src=this.dataset.back" onmouseout="this.src=this.dataset.front" alt="Uxie">
    <div class="name-block">
      <h1>Uxie</h1>
      <div class="type-badges"><span class="type-badge type-psychic">PSYCHIC</span></div>
      <p class="subtitle">Gen 7 Battle Factory — RU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Stealth Rock</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Psychic</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">U-turn</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Yawn</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/leftovers.png" alt="">Leftovers</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Levitate</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Timid (+Spe, -Atk)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 252 / DEF 80 / SPE 176</span></div>
      </div>
    </div>
  </div>

</body>

</html>
