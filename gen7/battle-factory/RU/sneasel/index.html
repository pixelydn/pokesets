<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sneasel — Gen 7 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g7bf">
  <a class="back-link" href="../">← RU</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5ani/sneasel.gif" data-front="https://play.pokemonshowdown.com/sprites/gen5ani/sneasel.gif" data-back="https://play.pokemonshowdown.com/sprites/gen5ani-back/sneasel.gif" onmouseover="this.src=this.dataset.back" onmouseout="this.src=this.dataset.front" onerror="this.onerror=null;this.src='https://play.pokemonshowdown.com/sprites/gen5/sneasel.png';this.onmouseover=null;this.onmouseout=null" alt="Sneasel">
    <div class="name-block">
      <h1>Sneasel</h1>
      <div class="type-badges"><span class="type-badge type-dark">DARK</span><span class="type-badge type-ice">ICE</span></div>
      <p class="subtitle">Gen 7 Battle Factory — RU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Knock Off</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Icicle Crash</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Ice Shard</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Pursuit</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/lifeorb.png" onerror="this.style.display='none'" alt="">Life Orb</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Inner Focus</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Jolly (+Spe, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">ATK 252 / DEF 4 / SPE 252</span></div>
      </div>
    </div>
  </div>

</body>

</html>
