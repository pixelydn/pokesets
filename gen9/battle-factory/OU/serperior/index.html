<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Serperior — Gen 9 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g9bf">
  <a class="back-link" href="../">← OU</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5ani/serperior.gif" data-front="https://play.pokemonshowdown.com/sprites/gen5ani/serperior.gif" data-back="https://play.pokemonshowdown.com/sprites/gen5ani-back/serperior.gif" onmouseover="this.src=this.dataset.back" onmouseout="this.src=this.dataset.front" onerror="this.onerror=null;this.src='https://play.pokemonshowdown.com/sprites/gen5/serperior.png';this.onmouseover=null;this.onmouseout=null" alt="Serperior">
    <div class="name-block">
      <h1>Serperior</h1>
      <div class="type-badges"><span class="type-badge type-grass">GRASS</span></div>
      <p class="subtitle">Gen 9 Battle Factory — OU</p>
      <p class="mon-weight">Tier frequency: 0.4%</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Leaf Storm</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Glare</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Tera Blast</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Substitute / Dragon Pulse</span></div>
        <div class="row"><span class="row-label">Frequency</span><span class="row-value">100%</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/leftovers.png" onerror="this.style.display='none'" alt="">Leftovers</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Contrary</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Timid (+Spe, -Atk)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">SPA 252 / SPD 4 / SPE 252</span></div>
        <div class="row"><span class="row-label">Tera</span><span class="row-value"><span class="type-badge type-fire">FIRE</span><span class="type-badge type-ground">GROUND</span><span class="tera-star">★</span></span></div>
      </div>
    </div>
  </div>

</body>

</html>
