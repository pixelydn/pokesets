<!DOCTYPE html>
<html lang="en">

<head>

</head>

<body class="g9bf">
  <a class="back-link" href="../">← OU</a>

    <div class="name-block">
      <h1>Greninja-Bond</h1>
      <div class="type-badges"><span class="type-badge type-water">WATER</span><span class="type-badge type-dark">DARK</span></div>

  </div>
  <p class="sets-label">Set(s):</p>

    <div class="set-inner">
      <div class="set-moves">

      </div>
      <div class="set-stats">

        <div class="row"><span class="row-label">Ability</span><span class="row-value">Battle Bond</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Timid (+Spe, -Atk)</span></div>

        <div class="row"><span class="row-label">Tera</span><span class="row-value"><span class="type-badge type-water">WATER</span><span class="type-badge type-ghost">GHOST</span></span></div>
      </div>
