<!DOCTYPE html>
<html lang="en">

<head>

  <link rel="stylesheet" href="../../../../styles.css">

<body class="g9bf">
  <a class="back-link" href="../">← RU</a>

    <div class="set-inner">

        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Stone Axe</span></div>

        <div class="row"><span class="row-label">Ability</span><span class="row-value">Sharpness</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Jolly (+Spe, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">ATK 252 / DEF 4 / SPE 252</span></div>
        <div class="row"><span class="row-label">Tera</span><span class="row-value"><span class="type-badge type-fighting">FIGHTING</span></span></div>

    </div>
