<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cresselia — Gen 9 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g9bf">
  <a class="back-link" href="../">← RU</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/cresselia.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/cresselia.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/cresselia.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/cresselia.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/cresselia.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Cresselia">
    <div class="name-block">
      <h1>Cresselia</h1>
      <div class="type-badges"><span class="type-badge type-psychic">PSYCHIC</span></div>
      <p class="subtitle">Gen 9 Battle Factory — RU</p>
      <p class="mon-weight">Tier frequency: 0.4%</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Calm Mind</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Moonblast</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Stored Power</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Moonlight</span></div>
        <div class="row"><span class="row-label">Frequency</span><span class="row-value">100%</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/leftovers.png" alt="">Leftovers</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Levitate</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Bold (+Def, -Atk)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 252 / DEF 236 / SPE 20</span></div>
        <div class="row"><span class="row-label">Tera</span><span class="row-value"><span class="type-badge type-poison">POISON</span></span></div>
      </div>
    </div>
    <div class="set-extra"><span class="extra-chip">IVs: ATK 0</span></div>
  </div>
