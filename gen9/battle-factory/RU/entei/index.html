<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entei — Gen 9 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g9bf">
  <a class="back-link" href="../">← RU</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/entei.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/entei.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/entei.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/entei.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/entei.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Entei">
    <div class="name-block">
      <h1>Entei</h1>
      <div class="type-badges"><span class="type-badge type-fire">FIRE</span></div>
      <p class="subtitle">Gen 9 Battle Factory — RU</p>
      <p class="mon-weight">Tier frequency: 0.8%</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Extreme Speed</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Sacred Fire</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Crunch</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Stone Edge / Stomping Tantrum</span></div>
        <div class="row"><span class="row-label">Frequency</span><span class="row-value">100%</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/choice-band.png" alt="">Choice Band</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Inner Focus</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Jolly (+Spe, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">ATK 252 / DEF 4 / SPE 252</span></div>
        <div class="row"><span class="row-label">Tera</span><span class="row-value"><span class="type-badge type-normal">NORMAL</span><span class="type-badge type-dark">DARK</span></span></div>
      </div>
    </div>
  </div>

</body>

</html>
