<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Muk-Alola — Gen 9 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g9bf">
  <a class="back-link" href="../">← RU</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/muk-alola.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/muk-alola.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/muk-alola.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/muk-alola.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/muk-alola.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Muk-Alola">
    <div class="name-block">
      <h1>Muk-Alola</h1>
      <div class="type-badges"><span class="type-badge type-poison">POISON</span><span class="type-badge type-dark">DARK</span></div>
      <p class="subtitle">Gen 9 Battle Factory — RU</p>
      <p class="mon-weight">Tier frequency: 0.4%</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Poison Jab</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Knock Off</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Rest</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Sleep Talk</span></div>
        <div class="row"><span class="row-label">Frequency</span><span class="row-value">100%</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/leftovers.png" alt="">Leftovers</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Poison Touch</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Careful (+SpD, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 252 / ATK 4 / SPD 252</span></div>
        <div class="row"><span class="row-label">Tera</span><span class="row-value"><span class="type-badge type-water">WATER</span><span class="type-badge type-fairy">FAIRY</span><span class="type-badge type-steel">STEEL</span><span class="type-badge type-flying">FLYING</span></span></div>
      </div>
    </div>
  </div>

</body>

</html>
