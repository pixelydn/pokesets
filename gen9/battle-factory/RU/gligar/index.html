<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gligar — Gen 9 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g9bf">
  <a class="back-link" href="../">← RU</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5ani/gligar.gif" data-front="https://play.pokemonshowdown.com/sprites/gen5ani/gligar.gif" data-back="https://play.pokemonshowdown.com/sprites/gen5ani-back/gligar.gif" onmouseover="this.src=this.dataset.back" onmouseout="this.src=this.dataset.front" onerror="this.onerror=null;this.src='https://play.pokemonshowdown.com/sprites/gen5/gligar.png';this.onmouseover=null;this.onmouseout=null" alt="Gligar">
    <div class="name-block">
      <h1>Gligar</h1>
      <div class="type-badges"><span class="type-badge type-ground">GROUND</span><span class="type-badge type-flying">FLYING</span></div>

      <p class="mon-weight">Tier frequency: 1.3%</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Spikes / Stealth Rock</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Earthquake</span></div>

      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/eviolite.png" onerror="this.style.display='none'" alt="">Eviolite</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Immunity</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Impish (+Def, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 252 / DEF 204 / SPD 36 / SPE 16</span></div>
        <div class="row"><span class="row-label">Tera</span><span class="row-value"><span class="type-badge type-water">WATER</span></span></div>
      </div>
    </div>
  </div>
