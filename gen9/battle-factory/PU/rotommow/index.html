<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <title>Rotom-Mow — Gen 9 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g9bf">
  <a class="back-link" href="../">← PU</a>

    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5ani/rotom-mow.gif" data-front="https://play.pokemonshowdown.com/sprites/gen5ani/rotom-mow.gif" data-back="https://play.pokemonshowdown.com/sprites/gen5ani-back/rotom-mow.gif" onmouseover="this.src=this.dataset.back" onmouseout="this.src=this.dataset.front" onerror="this.onerror=null;this.src='https://play.pokemonshowdown.com/sprites/gen5/rotom-mow.png';this.onmouseover=null;this.onmouseout=null" alt="Rotom-Mow">

  <p class="sets-label">Set(s):</p>

    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Volt Switch</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Thunderbolt / Discharge</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Leaf Storm</span></div>

      </div>

        <div class="row"><span class="row-label">Ability</span><span class="row-value">Levitate</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Timid (+Spe, -Atk)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">SPA 252 / SPD 4 / SPE 252</span></div>
        <div class="row"><span class="row-label">Tera</span><span class="row-value"><span class="type-badge type-electric">ELECTRIC</span></span></div>
      </div>
    </div>
    <div class="set-extra"><span class="extra-chip">IVs: ATK 0</span></div>
