<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hariyama — Gen 9 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g9bf">
  <a class="back-link" href="../">← PU</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/hariyama.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/hariyama.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/hariyama.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/hariyama.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/hariyama.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Hariyama">
    <div class="name-block">
      <h1>Hariyama</h1>
      <div class="type-badges"><span class="type-badge type-fighting">FIGHTING</span></div>
      <p class="subtitle">Gen 9 Battle Factory — PU</p>
      <p class="mon-weight">Tier frequency: 1.1%</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Bulk Up</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Drain Punch</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Knock Off</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Bullet Punch</span></div>
        <div class="row"><span class="row-label">Frequency</span><span class="row-value">100%</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/leftovers.png" alt="">Leftovers</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Guts / Thick Fat</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Adamant (+Atk, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 12 / ATK 200 / SPD 252 / SPE 44</span></div>
        <div class="row"><span class="row-label">Tera</span><span class="row-value"><span class="type-badge type-steel">STEEL</span></span></div>
      </div>
    </div>
  </div>

</body>

</html>
