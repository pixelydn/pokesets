<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Articuno-Galar — Gen 9 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g9bf">
  <a class="back-link" href="../">← PU</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/articuno-galar.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/articuno-galar.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/articuno-galar.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/articuno-galar.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/articuno-galar.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Articuno-Galar">
    <div class="name-block">
      <h1>Articuno-Galar</h1>
      <div class="type-badges"><span class="type-badge type-psychic">PSYCHIC</span><span class="type-badge type-flying">FLYING</span></div>
      <p class="subtitle">Gen 9 Battle Factory — PU</p>
      <p class="mon-weight">Tier frequency: 2.6%</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Future Sight</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Recover</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Hurricane</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">U-turn</span></div>
        <div class="row"><span class="row-label">Frequency</span><span class="row-value">100%</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/heavy-duty-boots.png" alt="">Heavy-Duty Boots</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Competitive</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Timid (+Spe, -Atk)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">SPA 252 / SPD 4 / SPE 252</span></div>
        <div class="row"><span class="row-label">Tera</span><span class="row-value"><span class="type-badge type-steel">STEEL</span></span></div>
      </div>
    </div>
  </div>

</body>

</html>
