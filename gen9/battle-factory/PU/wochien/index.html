<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wo-Chien — Gen 9 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g9bf">
  <a class="back-link" href="../">← PU</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/wo-chien.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/wo-chien.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/wo-chien.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/wo-chien.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/wo-chien.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Wo-Chien">
    <div class="name-block">
      <h1>Wo-Chien</h1>
      <div class="type-badges"><span class="type-badge type-dark">DARK</span><span class="type-badge type-grass">GRASS</span></div>
      <p class="subtitle">Gen 9 Battle Factory — PU</p>
      <p class="mon-weight">Tier frequency: 1.6%</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Knock Off</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Protect</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Leech Seed</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Foul Play / Ruination</span></div>
        <div class="row"><span class="row-label">Frequency</span><span class="row-value">100%</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/leftovers.png" alt="">Leftovers</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Tablets of Ruin</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Impish (+Def, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 252 / DEF 252 / SPD 4</span></div>
        <div class="row"><span class="row-label">Tera</span><span class="row-value"><span class="type-badge type-poison">POISON</span></span></div>
      </div>
    </div>
  </div>

</body>

</html>
