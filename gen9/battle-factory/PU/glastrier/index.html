<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Glastrier — Gen 9 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g9bf">
  <a class="back-link" href="../">← PU</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/glastrier.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/glastrier.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/glastrier.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/glastrier.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/glastrier.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Glastrier">
    <div class="name-block">
      <h1>Glastrier</h1>
      <div class="type-badges"><span class="type-badge type-ice">ICE</span></div>
      <p class="subtitle">Gen 9 Battle Factory — PU</p>
      <p class="mon-weight">Tier frequency: 0.5%</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Icicle Crash</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Close Combat</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">High Horsepower</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Swords Dance</span></div>
        <div class="row"><span class="row-label">Frequency</span><span class="row-value">100%</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/heavy-duty-boots.png" alt="">Heavy-Duty Boots</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Chilling Neigh</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Adamant (+Atk, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 132 / ATK 252 / SPE 124</span></div>
        <div class="row"><span class="row-label">Tera</span><span class="row-value"><span class="type-badge type-water">WATER</span><span class="type-badge type-poison">POISON</span></span></div>
      </div>
    </div>
  </div>
