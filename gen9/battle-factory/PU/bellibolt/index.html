<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bellibolt — Gen 9 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g9bf">
  <a class="back-link" href="../">← PU</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/bellibolt.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/bellibolt.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/bellibolt.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/bellibolt.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/bellibolt.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Bellibolt">
    <div class="name-block">
      <h1>Bellibolt</h1>
      <div class="type-badges"><span class="type-badge type-electric">ELECTRIC</span></div>
      <p class="subtitle">Gen 9 Battle Factory — PU</p>
      <p class="mon-weight">Tier frequency: 4.8%</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Volt Switch</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Muddy Water</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Slack Off</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Toxic</span></div>
        <div class="row"><span class="row-label">Frequency</span><span class="row-value">100%</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/heavy-duty-boots.png" alt="">Heavy-Duty Boots</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Static</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Bold (+Def, -Atk)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 252 / DEF 252 / SPA 4</span></div>
        <div class="row"><span class="row-label">Tera</span><span class="row-value"><span class="type-badge type-water">WATER</span></span></div>
      </div>
    </div>
    <div class="set-extra"><span class="extra-chip">IVs: ATK 0</span></div>
  </div>

</body>

</html>
