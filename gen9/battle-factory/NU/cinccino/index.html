<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cinccino — Gen 9 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g9bf">
  <a class="back-link" href="../">← NU</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/cinccino.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/cinccino.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/cinccino.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/cinccino.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/cinccino.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Cinccino">
    <div class="name-block">
      <h1>Cinccino</h1>
      <div class="type-badges"><span class="type-badge type-normal">NORMAL</span></div>
      <p class="subtitle">Gen 9 Battle Factory — NU</p>
      <p class="mon-weight">Tier frequency: 2.2%</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Tidy Up</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Tail Slap</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Bullet Seed / Knock Off</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Encore / Rock Blast / Triple Axel</span></div>
        <div class="row"><span class="row-label">Frequency</span><span class="row-value">100%</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/loaded-dice.png" alt="">Loaded Dice</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Technician</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Jolly (+Spe, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">ATK 252 / SPD 4 / SPE 252</span></div>
        <div class="row"><span class="row-label">Tera</span><span class="row-value"><span class="type-badge type-ghost">GHOST</span><span class="type-badge type-fire">FIRE</span></span></div>
      </div>
    </div>
  </div>

</body>

</html>
