<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Darmanitan-Galar — Gen 8 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g8bf">
  <a class="back-link" href="../">← Uber</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/darmanitan-galar.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/darmanitan-galar.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/darmanitan-galar.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/darmanitan-galar.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/darmanitan-galar.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Darmanitan-Galar">
    <div class="name-block">
      <h1>Darmanitan-Galar</h1>
      <div class="type-badges"><span class="type-badge type-ice">ICE</span></div>
      <p class="subtitle">Gen 8 Battle Factory — Uber</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Icicle Crash</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Flare Blitz</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">U-turn</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Earthquake / Rock Slide</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/choice-scarf.png" alt="">Choice Scarf</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Gorilla Tactics</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Jolly (+Spe, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">ATK 252 / SPD 4 / SPE 252</span></div>
      </div>
    </div>
  </div>

</body>

</html>
