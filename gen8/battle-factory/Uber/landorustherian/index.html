<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Landorus-Therian — Gen 8 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g8bf">
  <a class="back-link" href="../">← Uber</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/landorus-therian.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/landorus-therian.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/landorus-therian.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/landorus-therian.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/landorus-therian.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Landorus-Therian">
    <div class="name-block">
      <h1>Landorus-Therian</h1>
      <div class="type-badges"><span class="type-badge type-ground">GROUND</span><span class="type-badge type-flying">FLYING</span></div>
      <p class="subtitle">Gen 8 Battle Factory — Uber</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Earthquake</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">U-turn</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Stealth Rock</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Stone Edge / Toxic</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/leftovers.png" alt="">Leftovers</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Intimidate</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Impish (+Def, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 248 / DEF 252 / SPE 8</span></div>
      </div>
    </div>
  </div>

</body>
