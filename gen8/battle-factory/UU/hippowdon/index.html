<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hippowdon — Gen 8 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g8bf">
  <a class="back-link" href="../">← UU</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5ani/hippowdon.gif" data-front="https://play.pokemonshowdown.com/sprites/gen5ani/hippowdon.gif" data-back="https://play.pokemonshowdown.com/sprites/gen5ani-back/hippowdon.gif" onmouseover="this.src=this.dataset.back" onmouseout="this.src=this.dataset.front" onerror="this.onerror=null;this.src='https://play.pokemonshowdown.com/sprites/gen5/hippowdon.png';this.onmouseover=null;this.onmouseout=null" alt="Hippowdon">
    <div class="name-block">
      <h1>Hippowdon</h1>
      <div class="type-badges"><span class="type-badge type-ground">GROUND</span></div>
      <p class="subtitle">Gen 8 Battle Factory — UU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Earthquake</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Stealth Rock</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Toxic</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Slack Off</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/rockyhelmet.png" onerror="this.style.display='none'" alt="">Rocky Helmet / Leftovers</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Sand Stream</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Impish (+Def, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 252 / ATK 8 / DEF 32 / SPD 216</span></div>
      </div>
    </div>
  </div>

</body>

</html>
