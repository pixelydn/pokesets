<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Excadrill — Gen 8 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g8bf">
  <a class="back-link" href="../">← UU</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/excadrill.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/excadrill.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/excadrill.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/excadrill.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/excadrill.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Excadrill">
    <div class="name-block">
      <h1>Excadrill</h1>
      <div class="type-badges"><span class="type-badge type-ground">GROUND</span><span class="type-badge type-steel">STEEL</span></div>
      <p class="subtitle">Gen 8 Battle Factory — UU</p>

  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Iron Head</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Earthquake</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Rapid Spin</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Toxic / Swords Dance / Stealth Rock</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/leftovers.png" alt="">Leftovers</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Mold Breaker</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Jolly (+Spe, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 4 / ATK 252 / SPE 252</span></div>
      </div>
    </div>
  </div>

</body>
