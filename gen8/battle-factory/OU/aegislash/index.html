<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aegislash — Gen 8 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g8bf">
  <a class="back-link" href="../">← OU</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/aegislash.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/aegislash.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/aegislash.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/aegislash.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/aegislash.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Aegislash">
    <div class="name-block">
      <h1>Aegislash</h1>
      <div class="type-badges"><span class="type-badge type-steel">STEEL</span><span class="type-badge type-ghost">GHOST</span></div>
      <p class="subtitle">Gen 8 Battle Factory — OU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Shadow Ball</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Flash Cannon</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Shadow Sneak</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Close Combat</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/choice-specs.png" alt="">Choice Specs / <img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/spell-tag.png" alt="">Spell Tag</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Stance Change</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Modest (+SpA, -Atk)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">ATK 4 / SPA 252 / SPE 252</span></div>
      </div>
    </div>
  </div>

</body>

</html>
