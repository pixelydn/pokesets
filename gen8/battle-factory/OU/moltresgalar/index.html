<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Moltres-Galar — Gen 8 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g8bf">
  <a class="back-link" href="../">← OU</a>
  <div class="page-header">

    <div class="name-block">
      <h1>Moltres-Galar</h1>
      <div class="type-badges"><span class="type-badge type-dark">DARK</span><span class="type-badge type-flying">FLYING</span></div>
      <p class="subtitle">Gen 8 Battle Factory — OU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Nasty Plot</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Agility</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Fiery Wrath</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Hurricane / Air Slash</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/heavy-duty-boots.png" alt="">Heavy-Duty Boots</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Berserk</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Modest (+SpA, -Atk)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">SPA 252 / SPD 4 / SPE 252</span></div>
      </div>
    </div>
    <div class="set-extra"><span class="extra-chip">IVs: ATK 0</span></div>
  </div>
