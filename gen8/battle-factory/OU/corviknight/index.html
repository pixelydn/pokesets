<!DOCTYPE html>

<head>

<body class="g8bf">

        <div class="row"><span class="row-label">Ability</span><span class="row-value">Pressure</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Impish (+Def, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 252 / DEF 168 / SPD 88</span></div>

    </div>
