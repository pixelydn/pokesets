<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Victini — Gen 8 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g8bf">
  <a class="back-link" href="../">← OU</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/victini.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/victini.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/victini.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/victini.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/victini.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Victini">
    <div class="name-block">
      <h1>Victini</h1>
      <div class="type-badges"><span class="type-badge type-psychic">PSYCHIC</span><span class="type-badge type-fire">FIRE</span></div>
      <p class="subtitle">Gen 8 Battle Factory — OU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">V-create</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Bolt Strike</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Glaciate / Encore / Taunt</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">U-turn</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/heavy-duty-boots.png" alt="">Heavy-Duty Boots</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Victory Star</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Jolly (+Spe, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">ATK 252 / SPA 4 / SPE 252</span></div>
      </div>
    </div>
  </div>

</body>

</html>
