<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Heliolisk — Gen 8 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g8bf">
  <a class="back-link" href="../">← RU</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/heliolisk.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/heliolisk.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/heliolisk.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/heliolisk.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/heliolisk.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Heliolisk">
    <div class="name-block">
      <h1>Heliolisk</h1>
      <div class="type-badges"><span class="type-badge type-electric">ELECTRIC</span><span class="type-badge type-normal">NORMAL</span></div>
      <p class="subtitle">Gen 8 Battle Factory — RU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Thunderbolt</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Grass Knot</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Hyper Voice / Surf</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">U-turn / Volt Switch</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/heavy-duty-boots.png" alt="">Heavy-Duty Boots</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Dry Skin</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Timid (+Spe, -Atk)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 4 / SPA 252 / SPE 252</span></div>
      </div>
    </div>
    <div class="set-extra"><span class="extra-chip">IVs: ATK 0</span></div>
  </div>

</body>

</html>
