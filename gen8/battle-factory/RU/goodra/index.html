<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Goodra — Gen 8 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g8bf">
  <a class="back-link" href="../">← RU</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5ani/goodra.gif" data-front="https://play.pokemonshowdown.com/sprites/gen5ani/goodra.gif" data-back="https://play.pokemonshowdown.com/sprites/gen5ani-back/goodra.gif" onmouseover="this.src=this.dataset.back" onmouseout="this.src=this.dataset.front" onerror="this.onerror=null;this.src='https://play.pokemonshowdown.com/sprites/gen5/goodra.png';this.onmouseover=null;this.onmouseout=null" alt="Goodra">
    <div class="name-block">
      <h1>Goodra</h1>
      <div class="type-badges"><span class="type-badge type-dragon">DRAGON</span></div>
      <p class="subtitle">Gen 8 Battle Factory — RU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Draco Meteor</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Fire Blast</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Hydro Pump</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Thunderbolt / Thunder</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/expertbelt.png" onerror="this.style.display='none'" alt="">Expert Belt</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Sap Sipper</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Timid (+Spe, -Atk)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">DEF 4 / SPA 252 / SPE 252</span></div>
      </div>
    </div>
    <div class="set-extra"><span class="extra-chip">IVs: ATK 0</span></div>
  </div>

</body>

</html>
