<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Linoone — Gen 8 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g8bf">
  <a class="back-link" href="../">← RU</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/linoone.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/linoone.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/linoone.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/linoone.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/linoone.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Linoone">
    <div class="name-block">
      <h1>Linoone</h1>
      <div class="type-badges"><span class="type-badge type-normal">NORMAL</span></div>
      <p class="subtitle">Gen 8 Battle Factory — RU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Belly Drum</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Extreme Speed</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Stomping Tantrum</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Throat Chop / Seed Bomb</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/figy-berry.png" alt="">Figy Berry</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Gluttony</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Adamant (+Atk, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 60 / ATK 252 / SPE 196</span></div>
      </div>
    </div>
  </div>

</body>

</html>
