<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Toxtricity — Gen 8 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g8bf">
  <a class="back-link" href="../">← RU</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5ani/toxtricity.gif" data-front="https://play.pokemonshowdown.com/sprites/gen5ani/toxtricity.gif" data-back="https://play.pokemonshowdown.com/sprites/gen5ani-back/toxtricity.gif" onmouseover="this.src=this.dataset.back" onmouseout="this.src=this.dataset.front" onerror="this.onerror=null;this.src='https://play.pokemonshowdown.com/sprites/gen5/toxtricity.png';this.onmouseover=null;this.onmouseout=null" alt="Toxtricity">
    <div class="name-block">
      <h1>Toxtricity</h1>
      <div class="type-badges"><span class="type-badge type-electric">ELECTRIC</span><span class="type-badge type-poison">POISON</span></div>
      <p class="subtitle">Gen 8 Battle Factory — RU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Boomburst</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Volt Switch</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Overdrive</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Snarl</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/choicespecs.png" onerror="this.style.display='none'" alt="">Choice Specs</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Punk Rock</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Modest (+SpA, -Atk)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 4 / SPA 252 / SPE 252</span></div>
      </div>
    </div>
    <div class="set-extra"><span class="extra-chip">IVs: ATK 0</span></div>
  </div>

</body>

</html>
