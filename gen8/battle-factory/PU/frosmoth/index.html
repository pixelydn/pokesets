<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Frosmoth — Gen 8 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g8bf">
  <a class="back-link" href="../">← PU</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/frosmoth.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/frosmoth.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/frosmoth.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/frosmoth.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/frosmoth.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Frosmoth">
    <div class="name-block">
      <h1>Frosmoth</h1>
      <div class="type-badges"><span class="type-badge type-ice">ICE</span><span class="type-badge type-bug">BUG</span></div>
      <p class="subtitle">Gen 8 Battle Factory — PU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Ice Beam</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Quiver Dance</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Substitute</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Giga Drain</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/heavy-duty-boots.png" alt="">Heavy-Duty Boots</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Ice Scales</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Timid (+Spe, -Atk)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">SPA 252 / SPD 4 / SPE 252</span></div>
      </div>
    </div>
    <div class="set-extra"><span class="extra-chip">IVs: ATK 0</span></div>
  </div>

</body>
