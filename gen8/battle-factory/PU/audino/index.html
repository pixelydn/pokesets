<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Audino — Gen 8 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g8bf">
  <a class="back-link" href="../">← PU</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5ani/audino.gif" data-front="https://play.pokemonshowdown.com/sprites/gen5ani/audino.gif" data-back="https://play.pokemonshowdown.com/sprites/gen5ani-back/audino.gif" onmouseover="this.src=this.dataset.back" onmouseout="this.src=this.dataset.front" onerror="this.onerror=null;this.src='https://play.pokemonshowdown.com/sprites/gen5/audino.png';this.onmouseover=null;this.onmouseout=null" alt="Audino">
    <div class="name-block">
      <h1>Audino</h1>
      <div class="type-badges"><span class="type-badge type-normal">NORMAL</span></div>
      <p class="subtitle">Gen 8 Battle Factory — PU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Knock Off / Heal Bell / Encore</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Wish</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Protect</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Toxic</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/leftovers.png" onerror="this.style.display='none'" alt="">Leftovers / <img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/heavydutyboots.png" onerror="this.style.display='none'" alt="">Heavy-Duty Boots</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Regenerator</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Careful (+SpD, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 252 / DEF 4 / SPD 252</span></div>
      </div>
    </div>
  </div>

</body>

</html>
