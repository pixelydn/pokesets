<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g8bf">
  <a class="back-link" href="../">← PU</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/ferroseed.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/ferroseed.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/ferroseed.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/ferroseed.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/ferroseed.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Ferroseed">
    <div class="name-block">
      <h1>Ferroseed</h1>
      <div class="type-badges"><span class="type-badge type-grass">GRASS</span><span class="type-badge type-steel">STEEL</span></div>

  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Gyro Ball</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Spikes / Stealth Rock</span></div>

        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Protect / Knock Off</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/eviolite.png" alt="">Eviolite</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Iron Barbs</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Relaxed (+Def, -Spe)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 252 / ATK 4 / DEF 252</span></div>
      </div>
    </div>
    <div class="set-extra"><span class="extra-chip">IVs: SPE 0</span></div>
  </div>
