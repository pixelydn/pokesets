<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Arctovish — Gen 8 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g8bf">
  <a class="back-link" href="../">← PU</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/arctovish.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/arctovish.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/arctovish.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/arctovish.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/arctovish.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Arctovish">
    <div class="name-block">
      <h1>Arctovish</h1>
      <div class="type-badges"><span class="type-badge type-water">WATER</span><span class="type-badge type-ice">ICE</span></div>
      <p class="subtitle">Gen 8 Battle Factory — PU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Fishious Rend</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Icicle Crash</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Psychic Fangs</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Crunch</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/choice-band.png" alt="">Choice Band</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Water Absorb</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Adamant (+Atk, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">ATK 252 / DEF 4 / SPE 252</span></div>
      </div>
    </div>
  </div>

</body>
