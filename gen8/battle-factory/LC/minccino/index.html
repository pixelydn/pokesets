<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Minccino — Gen 8 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g8bf">
  <a class="back-link" href="../">← LC</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/minccino.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/minccino.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/minccino.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/minccino.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/minccino.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Minccino">
    <div class="name-block">
      <h1>Minccino</h1>
      <div class="type-badges"><span class="type-badge type-normal">NORMAL</span></div>
      <p class="subtitle">Gen 8 Battle Factory — LC</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Tail Slap</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Knock Off</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Seed Bomb</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">U-turn</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/life-orb.png" alt="">Life Orb</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Skill Link</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Jolly (+Spe, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">ATK 36 / DEF 196 / SPD 36 / SPE 236</span></div>
      </div>
    </div>
  </div>

</body>

</html>
