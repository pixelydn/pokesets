<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Golett — Gen 8 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g8bf">
  <a class="back-link" href="../">← LC</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/golett.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/golett.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/golett.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/golett.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/golett.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Golett">
    <div class="name-block">
      <h1>Golett</h1>
      <div class="type-badges"><span class="type-badge type-ground">GROUND</span><span class="type-badge type-ghost">GHOST</span></div>
      <p class="subtitle">Gen 8 Battle Factory — LC</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Poltergeist</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Dynamic Punch</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Earthquake</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Rock Slide</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/choice-scarf.png" alt="">Choice Scarf</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">No Guard</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Jolly (+Spe, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">ATK 244 / SPE 236</span></div>
      </div>
    </div>
  </div>

</body>

</html>
