<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wingull — Gen 8 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g8bf">
  <a class="back-link" href="../">← LC</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5ani/wingull.gif" data-front="https://play.pokemonshowdown.com/sprites/gen5ani/wingull.gif" data-back="https://play.pokemonshowdown.com/sprites/gen5ani-back/wingull.gif" onmouseover="this.src=this.dataset.back" onmouseout="this.src=this.dataset.front" onerror="this.onerror=null;this.src='https://play.pokemonshowdown.com/sprites/gen5/wingull.png';this.onmouseover=null;this.onmouseout=null" alt="Wingull">
    <div class="name-block">
      <h1>Wingull</h1>
      <div class="type-badges"><span class="type-badge type-water">WATER</span><span class="type-badge type-flying">FLYING</span></div>
      <p class="subtitle">Gen 8 Battle Factory — LC</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Hurricane</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Scald</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Knock Off</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Substitute</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/berryjuice.png" onerror="this.style.display='none'" alt="">Berry Juice</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Keen Eye</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Hasty (+Spe, -Def)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">SPA 236 / SPD 36 / SPE 236</span></div>
      </div>
    </div>
    <div class="set-extra"><span class="extra-chip">IVs: HP 19</span></div>
  </div>

</body>

</html>
