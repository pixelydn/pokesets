<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Onix — Gen 8 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g8bf">
  <a class="back-link" href="../">← LC</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/onix.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/onix.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/onix.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/onix.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/onix.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Onix">
    <div class="name-block">
      <h1>Onix</h1>
      <div class="type-badges"><span class="type-badge type-rock">ROCK</span><span class="type-badge type-ground">GROUND</span></div>
      <p class="subtitle">Gen 8 Battle Factory — LC</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Earthquake</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Rock Blast</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Stealth Rock</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Explosion / Endure</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/berry-juice.png" alt="">Berry Juice</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Sturdy</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Jolly (+Spe, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 76 / ATK 236 / SPE 196</span></div>
      </div>
    </div>
  </div>

</body>

</html>
