<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Elekid — Gen 8 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g8bf">
  <a class="back-link" href="../">← LC</a>
  <div class="page-header">
    <img class="sprite" src="https://play.pokemonshowdown.com/sprites/gen5ani/elekid.gif" data-front="https://play.pokemonshowdown.com/sprites/gen5ani/elekid.gif" data-back="https://play.pokemonshowdown.com/sprites/gen5ani-back/elekid.gif" onmouseover="this.src=this.dataset.back" onmouseout="this.src=this.dataset.front" onerror="this.onerror=null;this.src='https://play.pokemonshowdown.com/sprites/gen5/elekid.png';this.onmouseover=null;this.onmouseout=null" alt="Elekid">
    <div class="name-block">
      <h1>Elekid</h1>
      <div class="type-badges"><span class="type-badge type-electric">ELECTRIC</span></div>
      <p class="subtitle">Gen 8 Battle Factory — LC</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Thunderbolt</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Volt Switch</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Psychic</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Ice Punch / Brick Break</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/lifeorb.png" onerror="this.style.display='none'" alt="">Life Orb</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Vital Spirit</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Naive (+Spe, -SpD)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">ATK 12 / SPA 236 / SPE 236</span></div>
      </div>
    </div>
  </div>

</body>

</html>
