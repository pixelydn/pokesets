<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Foongus — Gen 8 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g8bf">
  <a class="back-link" href="../">← LC</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/foongus.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/foongus.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/foongus.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/foongus.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/foongus.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Foongus">
    <div class="name-block">
      <h1>Foongus</h1>
      <div class="type-badges"><span class="type-badge type-grass">GRASS</span><span class="type-badge type-poison">POISON</span></div>
      <p class="subtitle">Gen 8 Battle Factory — LC</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Spore</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Sludge Bomb</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Giga Drain</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Synthesis</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/eviolite.png" alt="">Eviolite</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Regenerator</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Bold (+Def, -Atk)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 124 / DEF 156 / SPD 156</span></div>
      </div>
    </div>
    <div class="set-extra"><span class="extra-chip">IVs: ATK 0</span></div>
  </div>

</body>

</html>
