<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stunky — Gen 8 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g8bf">
  <a class="back-link" href="../">← LC</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/stunky.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/stunky.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/stunky.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/stunky.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/stunky.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Stunky">
    <div class="name-block">
      <h1>Stunky</h1>
      <div class="type-badges"><span class="type-badge type-poison">POISON</span><span class="type-badge type-dark">DARK</span></div>
      <p class="subtitle">Gen 8 Battle Factory — LC</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Crunch</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Sucker Punch</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Play Rough</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Fire Blast</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/life-orb.png" alt="">Life Orb</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Aftermath</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Hasty (+Spe, -Def)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 12 / ATK 252 / SPE 244</span></div>
      </div>
    </div>
  </div>

</body>

</html>
