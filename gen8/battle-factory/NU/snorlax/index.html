<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Snorlax — Gen 8 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">
</head>

<body class="g8bf">
  <a class="back-link" href="../">← NU</a>
  <div class="page-header">
    <img class="sprite" id="main-sprite" src="https://play.pokemonshowdown.com/sprites/ani/snorlax.gif" data-front="https://play.pokemonshowdown.com/sprites/ani/snorlax.gif" data-back="https://play.pokemonshowdown.com/sprites/ani-back/snorlax.gif" data-static-front="https://play.pokemonshowdown.com/sprites/gen5/snorlax.png" data-static-back="https://play.pokemonshowdown.com/sprites/gen5-back/snorlax.png" onmouseover="this.src=window.staticMode?this.dataset.staticBack:this.dataset.back" onmouseout="this.src=window.staticMode?this.dataset.staticFront:this.dataset.front" alt="Snorlax">
    <div class="name-block">
      <h1>Snorlax</h1>
      <div class="type-badges"><span class="type-badge type-normal">NORMAL</span></div>
      <p class="subtitle">Gen 8 Battle Factory — NU</p>
    </div>
  </div>
  <p class="sets-label">Set(s):</p>
  <div class="set-block">
    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Curse</span></div>
        <div class="row"><span class="row-label">Move 2</span><span class="row-value">Body Slam</span></div>
        <div class="row"><span class="row-label">Move 3</span><span class="row-value">Earthquake / Fire Punch</span></div>
        <div class="row"><span class="row-label">Move 4</span><span class="row-value">Rest</span></div>
      </div>
      <div class="set-stats">
        <div class="row"><span class="row-label">Item</span><span class="row-value"><img class="item-icon" src="https://play.pokemonshowdown.com/sprites/itemicons/leftovers.png" alt="">Leftovers</span></div>
        <div class="row"><span class="row-label">Ability</span><span class="row-value">Thick Fat</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Careful (+SpD, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">HP 12 / DEF 244 / SPD 252</span></div>
      </div>
    </div>
    <div class="set-extra"><span class="extra-chip">IVs: ATK 0</span></div>
  </div>

</body>

</html>
