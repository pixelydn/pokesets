<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Virizion — Gen 8 Battle Factory</title>
  <link rel="stylesheet" href="../../../../styles.css">

<body class="g8bf">
  <a class="back-link" href="../">← NU</a>

    <div class="name-block">

    <div class="set-inner">
      <div class="set-moves">
        <div class="row"><span class="row-label">Move 1</span><span class="row-value">Leaf Blade</span></div>

        <div class="row"><span class="row-label">Ability</span><span class="row-value">Justified</span></div>
        <div class="row"><span class="row-label">Nature</span><span class="row-value">Jolly (+Spe, -SpA)</span></div>
        <div class="row"><span class="row-label">EVs</span><span class="row-value">ATK 252 / SPD 4 / SPE 252</span></div>
      </div>
    </div>
  </div>
